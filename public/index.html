<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calendário da Sala</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>

body{
font-family: Arial, sans-serif;
background:#0d47a1;
color:white;
text-align:center;
}

.fc-toolbar-title {
    text-transform: capitalize;
}

h1{
color:#ffee04;
}

#calendar{
max-width:900px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
color:black;
}
.fc-event-title {
white-space: normal !important;
}

.fc-daygrid-event {
white-space: normal !important;
}

.fc-event {
font-size: 12px;
}

a{
color:#000000;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Calendário da Sala 🦜</h1>

<div id="calendar"></div>

<div id="detalhes-evento" style="
margin: 20px auto;
padding: 15px;
max-width: 600px;
background: white;
color: black;
border-radius: 10px;
display: none;
"></div>

<a href="/admin">Área administrativa</a>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
function transformarLinks(texto) {
    if (!texto) return ""

    return texto.replace(
        /(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank">$1</a>'
    )
}
</script>

<script>

document.addEventListener('DOMContentLoaded', function() {

var calendarEl = document.getElementById('calendar');

fetch('/eventos')
.then(res => res.json())
.then(eventos => {

const eventosFormatados = eventos.map(e => ({
    title: e.titulo,
    start: e.data,
    extendedProps: {
        descricao: e.descricao
    }
}))

var calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

locale: 'pt-br',

events: eventosFormatados,

titleFormat: { year: 'numeric', month: 'long' },

eventClick: function(info) {

    const titulo = info.event.title
    const descricao = info.event.extendedProps.descricao || "Sem descrição"

    const div = document.getElementById("detalhes-evento")

    div.style.display = "block"

    div.innerHTML = `
        <h3>${titulo}</h3>
        <p>${transformarLinks(descricao)}</p>
    `
}

    });

calendar.render();

});

});


</script>

</body>
</html>
