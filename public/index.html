<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calendário da Sala</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0d47a1;
    color: white;
    text-align: center;
}

h1 {
    color: #ffee04;
}

.fc-toolbar-title {
    text-transform: capitalize;
}

#calendar {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    color: black;
}

#detalhes-evento {
    margin: 20px auto;
    padding: 15px;
    max-width: 600px;
    background: white;
    color: black;
    border-radius: 10px;
    display: none;
}

#tabela-lateral {
    position: fixed;
    right: 20px;
    top: 100px;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
    width: 220px;
}

a {
    color: #000;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Calendário da Sala 🦜</h1>

<div id="calendar"></div>

<div id="detalhes-evento"></div>

<div id="tabela-lateral">
    <h4>Atendimento</h4>
    <div id="tabela-professores"></div>
</div>

<a href="/admin">Área administrativa</a>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
// transforma links em clicáveis
function transformarLinks(texto) {
    if (!texto) return ""

    return texto.replace(
        /(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank">$1</a>'
    )
}

// evita quebrar se backend falhar
async function buscarEventos() {
    try {
        const res = await fetch("/eventos")

        const texto = await res.text()

        try {
            return JSON.parse(texto)
        } catch {
            console.error("Backend retornou algo inválido:", texto)
            return []
        }

    } catch (err) {
        console.error("Erro ao buscar eventos:", err)
        return []
    }
}

document.addEventListener('DOMContentLoaded', async function() {

    const calendarEl = document.getElementById('calendar')

    const eventos = await buscarEventos()

    const eventosFormatados = eventos.map(e => ({
        title: e.titulo,
        start: e.data,
        extendedProps: {
            descricao: e.descricao
        }
    }))

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'pt-br',
        events: eventosFormatados,
        titleFormat: { year: 'numeric', month: 'long' },

        eventClick: function(info) {

            const titulo = info.event.title
            const descricao = info.event.extendedProps.descricao || "Sem descrição"

            const div = document.getElementById("detalhes-evento")

            div.style.display = "block"

            div.innerHTML = `
                <h3>${titulo}</h3>
                <p>${transformarLinks(descricao)}</p>
            `
        }
    })

    calendar.render()
})
</script>

</body>
</html>
